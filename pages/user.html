<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户中心 - MySQL 数据库课程实训 OJ 系统</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .export-section {
            margin-top: 20px;
            padding: 20px;
            background: var(--card-bg, #f8f9fa);
            border-radius: 8px;
        }
        .export-section h3 {
            margin-bottom: 15px;
            color: var(--text-color, #333);
        }
        .export-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .export-buttons .btn {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .storage-stats {
            margin-top: 15px;
            padding: 15px;
            background: var(--bg-color, #fff);
            border-radius: 6px;
            font-size: 14px;
        }
        .storage-stats h4 {
            margin-bottom: 10px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }
        .stat-item {
            text-align: center;
            padding: 10px;
            background: var(--card-bg, #f0f0f0);
            border-radius: 4px;
        }
        .stat-item .value {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color, #007bff);
        }
        .stat-item .label {
            font-size: 12px;
            color: var(--text-muted, #666);
        }
        .cleanup-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color, #ddd);
        }
        .cleanup-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="container">
                <h1>MySQL 实训 OJ 系统</h1>
                <button class="menu-toggle" id="menu-toggle" aria-label="菜单">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <ul id="nav-menu">
                </ul>
                <div class="theme-toggle">
                    <button id="theme-btn">🌙</button>
                </div>
            </div>
        </nav>
    </header>
    
    <main>
        <section class="user-center">
            <div class="container">
                <div id="login-section" class="auth-section">
                    <h2>用户登录</h2>
                    <form id="login-form">
                        <div class="form-group">
                            <label for="login-username">用户名：</label>
                            <input type="text" id="login-username" required>
                        </div>
                        <div class="form-group">
                            <label for="login-password">密码：</label>
                            <input type="password" id="login-password" required>
                        </div>
                        <button type="submit" class="btn primary">登录</button>
                        <p class="auth-switch">还没有账号？<a href="#" id="show-register">立即注册</a></p>
                    </form>
                </div>
                
                <div id="register-section" class="auth-section" style="display: none;">
                    <h2>用户注册</h2>
                    <form id="register-form">
                        <div class="form-group">
                            <label for="register-username">用户名：</label>
                            <input type="text" id="register-username" required>
                        </div>
                        <div class="form-group">
                            <label for="register-password">密码：</label>
                            <input type="password" id="register-password" required>
                        </div>
                        <div class="form-group">
                            <label for="register-confirm-password">确认密码：</label>
                            <input type="password" id="register-confirm-password" required>
                        </div>
                        <div class="form-group">
                            <label for="register-role">角色：</label>
                            <select id="register-role" required>
                                <option value="student">学生</option>
                                <option value="teacher">教师</option>
                            </select>
                        </div>
                        <button type="submit" class="btn primary">注册</button>
                        <p class="auth-switch">已有账号？<a href="#" id="show-login">立即登录</a></p>
                    </form>
                </div>
                
                <div id="user-info" class="user-info" style="display: none;">
                    <div class="user-header">
                        <h2>用户信息</h2>
                        <button id="logout-btn" class="btn secondary">退出登录</button>
                    </div>
                    <div class="user-profile">
                        <p><strong>用户名：</strong><span id="user-name"></span></p>
                        <p><strong>角色：</strong><span id="user-role"></span></p>
                    </div>
                    <div class="user-stats">
                        <div class="stat-item">
                            <h3>已做题数</h3>
                            <p id="solved-count">0</p>
                        </div>
                        <div class="stat-item">
                            <h3>正确率</h3>
                            <p id="accuracy">0%</p>
                        </div>
                        <div class="stat-item">
                            <h3>提交次数</h3>
                            <p id="submit-count">0</p>
                        </div>
                    </div>
                    
                    <div class="export-section">
                        <h3>数据导出</h3>
                        <div class="export-buttons">
                            <button id="export-user-data" class="btn primary">导出用户数据</button>
                            <button id="export-history" class="btn secondary">导出考试历史</button>
                            <button id="export-all" class="btn secondary">导出全部数据</button>
                        </div>
                        
                        <div class="storage-stats" id="storage-stats">
                            <h4>存储统计</h4>
                            <div class="stats-grid">
                                <div class="stat-item">
                                    <div class="value" id="stats-users">0</div>
                                    <div class="label">用户数</div>
                                </div>
                                <div class="stat-item">
                                    <div class="value" id="stats-submissions">0</div>
                                    <div class="label">提交记录</div>
                                </div>
                                <div class="stat-item">
                                    <div class="value" id="stats-exams">0</div>
                                    <div class="label">考试数</div>
                                </div>
                                <div class="stat-item">
                                    <div class="value" id="stats-history">0</div>
                                    <div class="label">历史记录</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="cleanup-section">
                            <h4>数据清理</h4>
                            <p style="font-size: 14px; color: var(--text-muted, #666); margin-bottom: 10px;">
                                清理过期或不需要的数据以释放存储空间
                            </p>
                            <div class="cleanup-buttons">
                                <button id="cleanup-submissions" class="btn secondary">清理提交记录</button>
                                <button id="cleanup-history" class="btn secondary">清理考试历史</button>
                                <button id="cleanup-all" class="btn danger">清理全部数据</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="submission-history">
                        <h3>提交历史</h3>
                        <table id="submission-table">
                            <thead>
                                <tr>
                                    <th>题目</th>
                                    <th>提交时间</th>
                                    <th>结果</th>
                                    <th>执行时间</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <footer>
        <div class="container">
            <p>&copy; 2026 MySQL 数据库课程实训 OJ 系统</p>
        </div>
    </footer>
    
    <script type="module" src="../js/core.js"></script>
    <script type="module">
        import userSystem from '../js/user-system.js';
        import storage from '../js/storage.js';

        document.addEventListener('DOMContentLoaded', async () => {
            const loginSection = document.getElementById('login-section');
            const registerSection = document.getElementById('register-section');
            const userInfoSection = document.getElementById('user-info');
            const showRegisterBtn = document.getElementById('show-register');
            const showLoginBtn = document.getElementById('show-login');
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const logoutBtn = document.getElementById('logout-btn');
            const solvedCount = document.getElementById('solved-count');
            const accuracy = document.getElementById('accuracy');
            const submitCount = document.getElementById('submit-count');
            const submissionTable = document.getElementById('submission-table').querySelector('tbody');

            showRegisterBtn.addEventListener('click', (e) => {
                e.preventDefault();
                loginSection.style.display = 'none';
                registerSection.style.display = 'block';
                userInfoSection.style.display = 'none';
            });

            showLoginBtn.addEventListener('click', (e) => {
                e.preventDefault();
                loginSection.style.display = 'block';
                registerSection.style.display = 'none';
                userInfoSection.style.display = 'none';
            });

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('login-username').value;
                const password = document.getElementById('login-password').value;

                const result = await userSystem.login(username, password);
                alert(result.message);
                if (result.success) {
                    await loadUserInfo();
                }
            });

            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('register-username').value;
                const password = document.getElementById('register-password').value;
                const confirmPassword = document.getElementById('register-confirm-password').value;
                const role = document.getElementById('register-role').value;

                if (password !== confirmPassword) {
                    alert('两次输入的密码不一致');
                    return;
                }

                const result = await userSystem.register(username, password, role);
                alert(result.message);
                if (result.success) {
                    await loadUserInfo();
                }
            });

            logoutBtn.addEventListener('click', () => {
                userSystem.logout();
                loginSection.style.display = 'block';
                registerSection.style.display = 'none';
                userInfoSection.style.display = 'none';
            });

            async function loadUserInfo() {
                const user = userSystem.getCurrentUser();
                if (user) {
                    document.getElementById('user-name').textContent = user.username;
                    document.getElementById('user-role').textContent = userSystem.getRoleDisplayName(user.role);

                    solvedCount.textContent = user.solvedCount;
                    accuracy.textContent = `${user.accuracy}%`;
                    submitCount.textContent = user.submitCount;

                    await loadSubmissionHistory(user.username);
                    await loadStorageStats();

                    loginSection.style.display = 'none';
                    registerSection.style.display = 'none';
                    userInfoSection.style.display = 'block';
                } else {
                    loginSection.style.display = 'block';
                    registerSection.style.display = 'none';
                    userInfoSection.style.display = 'none';
                }
            }

            async function loadSubmissionHistory(username) {
                const submissions = await userSystem.getUserSubmissions(username, 20);
                
                if (submissions.length === 0) {
                    submissionTable.innerHTML = '<tr><td colspan="4">暂无提交记录</td></tr>';
                    return;
                }

                submissionTable.innerHTML = submissions.map(sub => `
                    <tr>
                        <td>${sub.problemTitle}</td>
                        <td>${new Date(sub.timestamp).toLocaleString()}</td>
                        <td class="${sub.result.toLowerCase()}">${sub.result}</td>
                        <td>${sub.executionTime || '--'}ms</td>
                    </tr>
                `).join('');
            }

            async function loadStorageStats() {
                try {
                    const stats = await storage.getStorageStats();
                    if (stats) {
                        document.getElementById('stats-users').textContent = stats.users;
                        document.getElementById('stats-submissions').textContent = stats.submissions;
                        document.getElementById('stats-exams').textContent = stats.exams;
                        document.getElementById('stats-history').textContent = stats.examHistory;
                    }
                } catch (error) {
                    console.error('加载存储统计失败:', error);
                }
            }

            document.getElementById('export-user-data').addEventListener('click', async () => {
                const result = await userSystem.exportAndDownload('user');
                if (result.success) {
                    alert(`用户数据已导出: ${result.filename}`);
                } else {
                    alert(`导出失败: ${result.error}`);
                }
            });

            document.getElementById('export-history').addEventListener('click', async () => {
                const result = await userSystem.exportAndDownload('history');
                if (result.success) {
                    alert(`考试历史已导出: ${result.filename}`);
                } else {
                    alert(`导出失败: ${result.error}`);
                }
            });

            document.getElementById('export-all').addEventListener('click', async () => {
                const result = await userSystem.exportAndDownload('all');
                if (result.success) {
                    alert(`全部数据已导出: ${result.filename}`);
                } else {
                    alert(`导出失败: ${result.error}`);
                }
            });

            document.getElementById('cleanup-submissions').addEventListener('click', async () => {
                if (confirm('确定要清理所有提交记录吗？此操作不可恢复。')) {
                    const result = await userSystem.manualCleanup({ clearSubmissions: true });
                    alert(`已清理 ${result.submissions} 条提交记录`);
                    await loadStorageStats();
                }
            });

            document.getElementById('cleanup-history').addEventListener('click', async () => {
                if (confirm('确定要清理所有考试历史吗？此操作不可恢复。')) {
                    const result = await userSystem.manualCleanup({ clearHistory: true, clearSessionData: true });
                    alert(`已清理 ${result.history} 条历史记录和 ${result.sessionData} 条会话数据`);
                    await loadStorageStats();
                }
            });

            document.getElementById('cleanup-all').addEventListener('click', async () => {
                if (confirm('确定要清理所有数据吗？此操作不可恢复，将清除提交记录、考试历史和会话数据。')) {
                    const result = await userSystem.manualCleanup({ 
                        clearSubmissions: true, 
                        clearHistory: true, 
                        clearSessionData: true,
                        clearExamResults: true
                    });
                    alert(`已清理:\n- ${result.submissions} 条提交记录\n- ${result.examResults} 条考试结果\n- ${result.history} 条历史记录\n- ${result.sessionData} 条会话数据`);
                    await loadStorageStats();
                }
            });

            await loadUserInfo();
        });
    </script>
</body>
</html>
