<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题目详情 - MySQL 数据库课程实训 OJ 系统</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="container">
                <h1>MySQL 实训 OJ 系统</h1>
                <button class="menu-toggle" id="menu-toggle" aria-label="菜单">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <ul id="nav-menu">
                </ul>
                <div class="theme-toggle">
                    <button id="theme-btn">🌙</button>
                </div>
            </div>
        </nav>
    </header>
    
    <main>
        <section class="problem-detail">
            <div class="container">
                <div class="detail-layout">
                    <div class="problem-sidebar" id="problem-sidebar">
                        <div class="sidebar-header">
                            <button class="collapse-btn" id="collapse-btn">
                                <span class="collapse-icon">←</span>
                            </button>
                        </div>
                        <div class="problem-header">
                            <h2 id="problem-title">题目名称</h2>
                            <div class="problem-meta">
                                <span class="chapter"><span id="problem-chapter">第1章</span></span>
                                <span class="difficulty" id="difficulty-badge">简单</span>
                            </div>
                        </div>
                        
                        <div class="problem-info-sections">
                            <div class="info-section">
                                <div class="section-title">描述</div>
                                <div id="problem-description">题目描述将显示在这里</div>
                            </div>
                            
                            <div class="info-section">
                                <div class="section-title">要求</div>
                                <div id="problem-requirement">SQL 要求将显示在这里</div>
                            </div>
                            
                            <div class="info-section collapsible" id="tables-section">
                                <div class="section-title toggleable">
                                    表结构
                                    <span class="toggle-icon">▼</span>
                                </div>
                                <div class="section-content" id="problem-tables">表结构将显示在这里</div>
                            </div>
                            
                            <div class="info-section collapsible" id="data-section">
                                <div class="section-title toggleable">
                                    初始数据
                                    <span class="toggle-icon">▼</span>
                                </div>
                                <div class="section-content" id="problem-data">初始数据将显示在这里</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="editor-workspace">
                        <div class="sql-editor">
                            <div class="editor-header">
                                <div class="editor-buttons">
                                    <button id="run-btn" class="primary">▶ 运行</button>
                                    <button id="submit-btn" class="success">✓ 提交</button>
                                    <button id="clear-btn">清空</button>
                                    <button id="format-btn">格式化</button>
                                </div>
                            </div>
                            <div class="editor-body">
                                <textarea id="sql-input" placeholder="请输入 SQL 语句..."></textarea>
                            </div>
                            <div class="editor-footer">
                                <div id="execution-time">执行时间：--</div>
                                <div id="judge-result"></div>
                            </div>
                        </div>
                        
                        <div class="result-section">
                            <div class="section-title">执行结果</div>
                            <div id="result-container">
                                <!-- 执行结果将显示在这里 -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <footer>
        <div class="container">
            <p>&copy; 2026 MySQL 数据库课程实训 OJ 系统</p>
        </div>
    </footer>
    
    <script type="module" src="../js/core.js"></script>
    <script type="module">
        import problemLoader from '../js/problem-loader.js';
        import SQLEditor from '../js/editor.js';
        import judgeEngine from '../js/judge-engine.js';
        import mysqlEngine from '../js/mysql-wasm-engine.js';

        // 题目详情页面逻辑
        document.addEventListener('DOMContentLoaded', async () => {
            const problemTitle = document.getElementById('problem-title');
            const problemChapter = document.getElementById('problem-chapter');
            const problemDescription = document.getElementById('problem-description');
            const problemTables = document.getElementById('problem-tables');
            const problemData = document.getElementById('problem-data');
            const problemRequirement = document.getElementById('problem-requirement');
            const sqlInput = document.getElementById('sql-input');
            const runBtn = document.getElementById('run-btn');
            const submitBtn = document.getElementById('submit-btn');
            const clearBtn = document.getElementById('clear-btn');
            const formatBtn = document.getElementById('format-btn');
            const executionTime = document.getElementById('execution-time');
            const judgeResult = document.getElementById('judge-result');
            const resultContainer = document.getElementById('result-container');

            // 初始化 SQL 编辑器
            const editor = new SQLEditor(sqlInput);
            
            // 设置 MySQL 引擎到判题引擎
            judgeEngine.setMySQLEngine(mysqlEngine);
            
            let currentProblem = null;

            // 获取 URL 中的题目 ID
            const urlParams = new URLSearchParams(window.location.search);
            const problemId = parseInt(urlParams.get('id'));

            if (!problemId) {
                problemTitle.textContent = '题目不存在';
                problemDescription.textContent = '请返回题库页面选择题目';
                return;
            }

            // 加载题目详情
            async function loadProblemDetail() {
                try {
                    const problem = await problemLoader.getProblemById(problemId);
                    if (!problem) {
                        problemTitle.textContent = '题目不存在';
                        problemDescription.textContent = '请返回题库页面选择题目';
                        return;
                    }

                    // 保存当前题目
                    currentProblem = problem;

                    // 填充题目信息
                    problemTitle.textContent = problem.title;
                    problemChapter.textContent = problem.chapterName || problem.chapter || '第1章';
                    const difficultyText = problem.difficulty === 'easy' ? '简单' : problem.difficulty === 'medium' ? '中等' : '困难';
                    const difficultyBadge = document.getElementById('difficulty-badge');
                    difficultyBadge.textContent = difficultyText;
                    difficultyBadge.className = 'difficulty ' + problem.difficulty;
                    problemDescription.textContent = problem.description;
                    problemRequirement.textContent = problem.requirement;

                    // 显示表结构
                    if (problem.tables && problem.tables.length > 0) {
                        problemTables.innerHTML = problem.tables.map(table => `
                            <div class="table-definition">
                                <h4>${table.name}</h4>
                                <pre>${table.definition}</pre>
                            </div>
                        `).join('');
                    } else {
                        problemTables.textContent = '无表结构';
                    }

                    // 显示初始数据
                    if (problem.initialData && problem.initialData.length > 0) {
                        problemData.innerHTML = problem.initialData.map(data => `
                            <div class="data-insert">
                                <pre>${data}</pre>
                            </div>
                        `).join('');
                    } else {
                        problemData.textContent = '无初始数据';
                    }
                } catch (error) {
                    console.error('加载题目详情失败:', error);
                    problemTitle.textContent = '加载失败';
                    problemDescription.textContent = '加载题目详情失败，请刷新页面重试';
                }
            }

            // 运行 SQL
            async function runSQL() {
                const sql = editor.getValue().trim();
                if (!sql) {
                    alert('请输入 SQL 语句');
                    return;
                }

                try {
                    const startTime = performance.now();
                    const result = await mysqlEngine.execute(sql);
                    const endTime = performance.now();
                    const time = (endTime - startTime).toFixed(2);

                    executionTime.textContent = `执行时间：${time}ms`;

                    if (result.success) {
                        // 显示执行结果
                        if (result.data && result.data.length > 0) {
                            const columns = result.columns;
                            const data = result.data;

                            let html = '<table class="result-table">';
                            html += '<thead><tr>';
                            columns.forEach(column => {
                                html += `<th>${column}</th>`;
                            });
                            html += '</tr></thead>';
                            html += '<tbody>';
                            data.forEach(row => {
                                html += '<tr>';
                                columns.forEach(column => {
                                    html += `<td>${row[column]}</td>`;
                                });
                                html += '</tr>';
                            });
                            html += '</tbody>';
                            html += '</table>';

                            resultContainer.innerHTML = html;
                        } else {
                            resultContainer.textContent = '执行成功，无返回数据';
                        }
                        judgeResult.textContent = '';
                    } else {
                        resultContainer.textContent = `错误：${result.error}`;
                        judgeResult.textContent = '执行失败';
                        judgeResult.className = 're';
                    }
                } catch (error) {
                    console.error('执行 SQL 失败:', error);
                    resultContainer.textContent = `错误：${error.message}`;
                    executionTime.textContent = '执行时间：--';
                    judgeResult.textContent = '执行失败';
                    judgeResult.className = 're';
                }
            }

            // 提交判题
            async function submitSQL() {
                const sql = editor.getValue().trim();
                if (!sql) {
                    alert('请输入 SQL 语句');
                    return;
                }

                if (!currentProblem) {
                    alert('题目加载失败，请刷新页面重试');
                    return;
                }

                judgeResult.textContent = '评判中...';
                judgeResult.className = '';

                try {
                    const result = await judgeEngine.judge(currentProblem, sql);
                    judgeResult.textContent = result.message;
                    judgeResult.className = result.result.toLowerCase();
                } catch (error) {
                    console.error('判题失败:', error);
                    judgeResult.textContent = '判题过程出错';
                    judgeResult.className = 're';
                }
            }

            // 清空 SQL 输入
            function clearSQL() {
                editor.clear();
                resultContainer.textContent = '';
                executionTime.textContent = '执行时间：--';
                judgeResult.textContent = '';
                judgeResult.className = '';
            }

            // 格式化 SQL
            function formatSQL() {
                editor.formatSQL();
            }

            // 事件监听
            runBtn.addEventListener('click', runSQL);
            submitBtn.addEventListener('click', submitSQL);
            clearBtn.addEventListener('click', clearSQL);
            formatBtn.addEventListener('click', formatSQL);

            // 可折叠区域切换
            document.querySelectorAll('.collapsible .toggleable').forEach(title => {
                title.addEventListener('click', () => {
                    const section = title.closest('.collapsible');
                    const content = section.querySelector('.section-content');
                    const icon = title.querySelector('.toggle-icon');
                    
                    section.classList.toggle('collapsed');
                    icon.textContent = section.classList.contains('collapsed') ? '▶' : '▼';
                });
            });

            // 侧边栏折叠功能
            const collapseBtn = document.getElementById('collapse-btn');
            const problemSidebar = document.getElementById('problem-sidebar');
            const detailLayout = document.querySelector('.detail-layout');
            
            collapseBtn.addEventListener('click', () => {
                problemSidebar.classList.toggle('collapsed');
                detailLayout.classList.toggle('sidebar-collapsed');
                
                const icon = collapseBtn.querySelector('.collapse-icon');
                icon.textContent = problemSidebar.classList.contains('collapsed') ? '→' : '←';
            });

            // 左右滑动调整宽度功能
            const resizeHandle = document.createElement('div');
            resizeHandle.className = 'resize-handle';
            problemSidebar.appendChild(resizeHandle);
            
            let isResizing = false;
            let startX = 0;
            let startWidth = 0;
            
            resizeHandle.addEventListener('mousedown', (e) => {
                if (problemSidebar.classList.contains('collapsed')) return;
                
                isResizing = true;
                startX = e.clientX;
                startWidth = problemSidebar.offsetWidth;
                
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                
                const deltaX = e.clientX - startX;
                const newWidth = Math.max(200, Math.min(500, startWidth + deltaX));
                
                detailLayout.style.gridTemplateColumns = `${newWidth}px 1fr`;
            });
            
            document.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            });

            // 初始化加载
            await loadProblemDetail();
        });
    </script>
</body>
</html>
