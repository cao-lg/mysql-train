    <script type="module" src="../../js/core.js"></script>
    <script type="module">
        import examResult from '../../js/exam-result.js';
        import examManager from '../../js/exam-manager.js';
        import { getScoreLevel, formatDateTime } from '../../js/exam-utils.js';

        let currentResultId = null;
        let allQuestionDetails = [];
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            currentResultId = urlParams.get('id');

            if (!currentResultId) {
                showError('考试结果ID不存在');
                setTimeout(() => {
                    window.location.href = 'manage.html';
                }, 2000);
                return;
            }

            initTabs();
            await loadResult();
        });

        function initTabs() {
            const tabBtns = document.querySelectorAll('.tab-btn');
            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    tabBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.tab;
                    renderQuestionResults();
                });
            });
        }

        async function loadResult() {
            try {
                const analysisResult = await examResult.generateAnalysis(currentResultId);
                if (!analysisResult.success) {
                    showError('加载考试结果失败: ' + analysisResult.error);
                    return;
                }

                const analysis = analysisResult.analysis;

                document.getElementById('exam-name').textContent = analysis.examName;
                document.getElementById('score').textContent = analysis.score;
                document.getElementById('total-score').textContent = analysis.totalScore;
                document.getElementById('accuracy').textContent = analysis.accuracy + '%';
                document.getElementById('duration').textContent = analysis.duration;
                document.getElementById('complete-time').textContent = formatDateTime(analysis.endTime);

                const levelInfo = getScoreLevel(analysis.score, analysis.totalScore);
                document.getElementById('score-level').textContent = levelInfo.text;
                document.getElementById('score').className = `score ${levelInfo.level}`;

                await loadChapterAnalysis();
                await loadQuestionDetails();
            } catch (error) {
                console.error('加载结果失败:', error);
                showError('加载失败，请重试');
            }
        }

        async function loadChapterAnalysis() {
            try {
                const result = await examResult.getChapterAnalysis(currentResultId);
                if (!result.success) {
                    console.warn('章节分析加载失败:', result.error);
                    return;
                }

                const chapterAnalysis = result.chapterAnalysis;
                if (!chapterAnalysis || chapterAnalysis.length === 0) {
                    return;
                }

                const container = document.getElementById('chapter-analysis');
                const section = document.getElementById('chapter-analysis-section');
                
                container.innerHTML = chapterAnalysis.map(chapter => {
                    const accuracy = parseFloat(chapter.accuracy);
                    const progressClass = accuracy >= 80 ? 'high' : accuracy >= 60 ? 'medium' : 'low';
                    
                    return `
                        <div class="chapter-item">
                            <div class="chapter-header">
                                <span class="chapter-name">${chapter.chapterName}</span>
                                <span class="chapter-stats">${chapter.correct}/${chapter.total} 正确</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill ${progressClass}" style="width: ${accuracy}%"></div>
                            </div>
                            <div class="chapter-detail">
                                <span>正确率: ${accuracy}%</span>
                                <span>得分: ${chapter.score}/${chapter.totalScore}</span>
                            </div>
                        </div>
                    `;
                }).join('');

                section.style.display = 'block';
            } catch (error) {
                console.error('加载章节分析失败:', error);
            }
        }

        async function loadQuestionDetails() {
            try {
                const result = await examResult.getQuestionDetails(currentResultId);
                if (!result.success) {
                    document.getElementById('question-results').innerHTML = `
                        <div class="error-message">无法加载题目详情: ${result.error}</div>
                    `;
                    return;
                }

                allQuestionDetails = result.questionDetails;
                updateStats();
                renderQuestionResults();
            } catch (error) {
                console.error('加载题目详情失败:', error);
                document.getElementById('question-results').innerHTML = `
                    <div class="error-message">加载题目详情失败</div>
                `;
            }
        }

        function updateStats() {
            const correct = allQuestionDetails.filter(q => q.status === 'AC').length;
            const incorrect = allQuestionDetails.filter(q => q.status === 'WA').length;
            const unanswered = allQuestionDetails.filter(q => q.status === 'UNANSWERED').length;
            const total = allQuestionDetails.length;
            const accuracy = total > 0 ? ((correct / total) * 100).toFixed(1) : 0;

            document.getElementById('correct-count').textContent = `(${correct})`;
            document.getElementById('incorrect-count').textContent = `(${incorrect})`;
            document.getElementById('unanswered-count').textContent = `(${unanswered})`;

            document.getElementById('stat-correct').textContent = correct;
            document.getElementById('stat-incorrect').textContent = incorrect;
            document.getElementById('stat-unanswered').textContent = unanswered;
            document.getElementById('stat-accuracy').textContent = accuracy + '%';
        }

        function renderQuestionResults() {
            let filtered = allQuestionDetails;
            
            switch (currentFilter) {
                case 'correct':
                    filtered = allQuestionDetails.filter(q => q.status === 'AC');
                    break;
                case 'incorrect':
                    filtered = allQuestionDetails.filter(q => q.status === 'WA');
                    break;
                case 'unanswered':
                    filtered = allQuestionDetails.filter(q => q.status === 'UNANSWERED');
                    break;
            }

            const container = document.getElementById('question-results');
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading">暂无数据</div>';
                return;
            }

            container.innerHTML = filtered.map(q => renderQuestionItem(q)).join('');
        }

        function renderQuestionItem(q) {
            const statusText = {
                'AC': '正确',
                'WA': '错误',
                'UNANSWERED': '未作答'
            };

            const difficultyText = {
                'easy': '简单',
                'medium': '中等',
                'hard': '困难'
            };

            const difficultyClass = q.difficulty ? `difficulty-${q.difficulty}` : '';

            return `
                <div class="question-result-item">
                    <div class="question-result-header">
                        <div class="question-result-title">
                            <span>第 ${q.index} 题</span>
                            <div class="question-meta">
                                ${q.chapterName ? `<span class="question-tag">${q.chapterName}</span>` : ''}
                                ${q.difficulty ? `<span class="question-tag ${difficultyClass}">${difficultyText[q.difficulty] || q.difficulty}</span>` : ''}
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <span class="score-badge ${q.isCorrect ? 'earned' : 'missed'}">
                                ${q.score}/${q.maxScore} 分
                            </span>
                            <span class="question-result-status status ${q.status}">
                                ${statusText[q.status]}
                            </span>
                        </div>
                    </div>
                    <div class="question-result-content">
                        <div class="question-description">${escapeHtml(q.description || '暂无题目描述')}</div>
                        <div class="answer-section">
                            <div class="answer-label ${q.status === 'AC' ? 'correct' : q.status === 'WA' ? 'incorrect' : ''}">
                                您的答案：
                            </div>
                            <div class="answer-content">${escapeHtml(q.userAnswer) || '（未作答）'}</div>
                        </div>
                        ${q.correctAnswer ? `
                            <div class="answer-section">
                                <div class="answer-label correct">正确答案：</div>
                                <div class="answer-content">${escapeHtml(q.correctAnswer)}</div>
                            </div>
                        ` : ''}
                        ${q.explanation && q.explanation !== '暂无解析' ? `
                            <div class="explanation-section">
                                <div class="explanation-title">💡 解析</div>
                                <div class="explanation-content">${escapeHtml(q.explanation)}</div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(message) {
            const container = document.getElementById('question-results');
            container.innerHTML = `<div class="error-message">${message}</div>`;
        }
    </script>
</body>
</html>
